<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Small Business Calculators – Free Online Tools</title>
  <meta name="description" content="Free online business calculators including profit margin, markup, ROI and more. Simple, fast and accurate tools for small businesses." />
  <link rel="canonical" href="https://smallbusinesscalculators.com/" />
  <meta name="robots" content="index,follow" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fafafa;
      color: #111;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    p {
      color: #444;
      font-size: 18px;
    }

    .grid {
      margin-top: 40px;
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #e5e5e5;
      text-decoration: none;
      color: inherit;
      transition: 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Small Business Calculators</h1>
    <p>Free online tools to calculate profit margin, markup, ROI and more. Built for small business owners.</p>

    <div class="grid">
      <a class="card" href="/profit-margin-calculator.html">
        <h2>Profit Margin Calculator</h2>
        <p>Calculate gross profit, gross margin %, and markup % instantly.</p>
      </a>

      <!-- Future calculators will go here -->
    </div>

    <footer>
      © <span id="year"></span> SmallBusinessCalculators
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
