<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Sales Tax Calculator (Free) – Calculate Price with Tax</title>
<meta name="description" content="Free sales tax calculator. Add or remove tax from a price instantly. Calculate total price including tax or find tax amount." />
<meta name="robots" content="index,follow" />
<link rel="canonical" href="https://smallbusinesscalculators.com/sales-tax-calculator.html" />

<link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="brand">SmallBusinessCalculators</a>
  </div>
</header>

<div class="wrap">
<h1>Sales Tax Calculator</h1>

<p>Calculate total price including tax or extract tax from a price.</p>

<div class="calc-card">

<label>Amount</label>
<input type="number" id="amount" placeholder="e.g. 100" />

<label>Tax %</label>
<input type="number" id="tax" placeholder="e.g. 25" />

<div class="btnrow">
<button onclick="calc()">Calculate</button>
<button onclick="resetCalc()">Reset</button>
</div>

</div>

<div class="calc-card">
<h2>Results</h2>

<div class="result-row">
<div>Total Price</div>
<div id="total">—</div>
</div>

<div class="result-row">
<div>Tax Amount</div>
<div id="taxAmount">—</div>
</div>

</div>

<h2>Related Calculators</h2>
<ul>
  <li><a href="/profit-margin-calculator.html">Profit Margin Calculator</a></li>
  <li><a href="/markup-calculator.html">Markup Calculator</a></li>
  <li><a href="/gross-margin-calculator.html">Gross Margin Calculator</a></li>
  <li><a href="/discount-calculator.html">Discount Calculator</a></li>
</ul>

</div>

<script>
function calc() {
  const amount = parseFloat(document.getElementById("amount").value);
  const tax = parseFloat(document.getElementById("tax").value);

  if (isNaN(amount) || isNaN(tax)) return;

  const taxAmount = amount * (tax / 100);
  const total = amount + taxAmount;

  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("taxAmount").innerText = taxAmount.toFixed(2);
}

function resetCalc() {
  document.getElementById("amount").value = "";
  document.getElementById("tax").value = "";
  document.getElementById("total").innerText = "—";
  document.getElementById("taxAmount").innerText = "—";
}
</script>

</body>
</html>
